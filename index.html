<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>デカブサRUN</title>
<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
}
canvas{
  background:#111;
}
</style>
</head>
<body>

<canvas id="game" width="360" height="640"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gravity = 0.6;
let gameOver = false;

// デカブサ
const player = {
  x: 80,
  y: 500,
  w: 50,
  h: 50,
  vy: 0,
  jump: false
};

// 敵
let enemies = [];

// 地面
const groundY = 550;

// ジャンプ操作
document.addEventListener("touchstart", jump);
document.addEventListener("mousedown", jump);

function jump(){
  if(!player.jump){
    player.vy = -12;
    player.jump = true;
  }
}

// 敵生成
function spawnEnemy(){
  enemies.push({
    x: canvas.width,
    y: groundY - 40,
    w: 40,
    h: 40,
    speed: 4 + Math.random()*2
  });
}

// 当たり判定
function hit(a,b){
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

// 更新
function update(){
  if(gameOver) return;

  // 重力
  player.vy += gravity;
  player.y += player.vy;

  // 地面
  if(player.y > groundY - player.h){
    player.y = groundY - player.h;
    player.vy = 0;
    player.jump = false;
  }

  // 敵更新
  enemies.forEach(e=>{
    e.x -= e.speed;
  });

  // 敵削除
  enemies = enemies.filter(e=>e.x > -50);

  // 当たり判定
  enemies.forEach(e=>{
    if(hit(player,e)){
      gameOver = true;
    }
  });

  // 敵生成ランダム
  if(Math.random() < 0.02){
    spawnEnemy();
  }
}

// 描画
function draw(){
  // 背景
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 地面
  ctx.fillStyle="#333";
  ctx.fillRect(0,groundY,canvas.width,5);

  // プレイヤー（デカブサ）
  ctx.fillStyle="#aaa";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // 敵
  ctx.fillStyle="#f55";
  enemies.forEach(e=>{
    ctx.fillRect(e.x,e.y,e.w,e.h);
  });

  // ゲームオーバー
  if(gameOver){
    ctx.fillStyle="#fff";
    ctx.font="24px sans-serif";
    ctx.fillText("今日は行くのやめよ",80,300);
  }
}

// ループ
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
