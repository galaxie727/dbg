<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>デカブサ：見てただけ</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  display:flex;
  justify-content:center;
}
.app{
  max-width:420px;
  width:100%;
  min-height:100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  text-align:center;
}

/* キャラ */
.chara{
  width:80%;
  max-width:260px;
  margin-top:20px;
}

/* イベント表示 */
.event{
  font-size:22px;
  margin:30px 0;
  min-height:80px;
}

/* タップ誘導（押させるための罠） */
.tapArea{
  margin-top:auto;
  width:100%;
  padding:20px;
  border-radius:12px;
  background:rgba(255,255,255,.08);
  font-size:18px;
}

.result{
  font-size:26px;
  margin-top:20px;
}

.small{
  opacity:.7;
  font-size:14px;
}
</style>
</head>

<body>
<div class="app">

<div id="game">
  <img src="dekabusa.png" class="chara">

  <div class="event" id="eventText">何かが起きそうだ…</div>

  <div class="tapArea" id="tapArea">
    タップすると何かできるかも
  </div>
</div>

<div id="result" style="display:none;">
  <img src="dekabusa.png" class="chara">

  <div class="result" id="rank"></div>
  <div id="comment"></div>

  <button onclick="location.reload()" style="margin-top:20px;padding:14px 20px;border-radius:10px;border:none;">
    もう一回
  </button>
</div>

</div>

<script>
let tapped = 0;
let time = 0;
let gameTime = 6000;

const events = [
  "ペンペンが走ってる",
  "ペンペンが転んだ",
  "トラさんが分身した",
  "分身が増えすぎた",
  "ナマーザ様が干からびた",
  "黒い塊になった…",
  "嵐が来た",
  "全部吹き飛んだ"
];

const eventText = document.getElementById("eventText");
const tapArea = document.getElementById("tapArea");

tapArea.onclick = () => {
  tapped++;
  tapArea.textContent = "触ったな…";
};

let interval = setInterval(() => {
  time += 1000;

  eventText.textContent = events[Math.floor(Math.random()*events.length)];

  // タップ誘導（ちょっと揺らす）
  tapArea.style.opacity = String(0.8 + Math.random()*0.2);

  if(time >= gameTime){
    clearInterval(interval);
    endGame();
  }

},1000);

function endGame(){
  document.getElementById("game").style.display="none";
  document.getElementById("result").style.display="block";

  let rank, comment;

  if(tapped === 0){
    rank = "S";
    comment = "見てただけ";
  }else if(tapped <= 2){
    rank = "B";
    comment = "ちょっと関わったな";
  }else{
    rank = "C";
    comment = "余計なことしたな";
  }

  document.getElementById("rank").textContent = rank;
  document.getElementById("comment").textContent = comment;
}
</script>

</body>
</html>
